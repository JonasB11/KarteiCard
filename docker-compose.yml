services:
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://karteicard:karteicard@db:3306/karteicard}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-dev-secret}
    ports:
      - "5001:5000"
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-karteicard}
      MYSQL_USER: ${MYSQL_USER:-karteicard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-karteicard}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
